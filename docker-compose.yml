version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: respuestos_postgres
    environment:
      POSTGRES_USER: respuestos
      POSTGRES_PASSWORD: respuestos_pass_123
      POSTGRES_DB: respuestos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respuestos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - respuestos_network

  # Backend FastAPI
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: respuestos_backend
    environment:
      DATABASE_URL: postgresql://respuestos:respuestos_pass_123@postgres:5432/respuestos_db
      SECRET_KEY: tu-secret-key-super-seguro-cambiar-en-produccion
      DEBUG: "False"
      CORS_ORIGINS: ["http://localhost:3000", "http://localhost:5173", "http://localhost"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - respuestos_network
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Frontend React
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: respuestos_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend
    networks:
      - respuestos_network

  # pgAdmin - Administrador de BD
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: respuestos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - respuestos_network

  # Redis (opcional para caching)
  redis:
    image: redis:7-alpine
    container_name: respuestos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - respuestos_network

volumes:
  postgres_data:
  redis_data:

networks:
  respuestos_network:
    driver: bridge
