version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: respuestos_postgres
    environment:
      POSTGRES_USER: respuestos
      POSTGRES_PASSWORD: respuestos_pass_123
      POSTGRES_DB: respuestos_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U respuestos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Administrador de BD
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: respuestos_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # Redis (opcional para caching)
  redis:
    image: redis:7-alpine
    container_name: respuestos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
